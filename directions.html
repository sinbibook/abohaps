<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/directions.css">
  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="강화 아보하 애견펜션 - 오시는길" />
  <meta property="og:description" content="아보하의 이름처럼, 특별한 하루보다

평범한 하루가
가장 값진 기억이 될 수 있도록,
아보하가 함께하겠습니다" />
  <meta property="og:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/f9520fa3-9bad-47b7-8e66-75df80ca1bad/thumbnail/1763952348766-11we3rjuurm.jpg" />
  <meta property="og:url" content="https://abohaps.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="강화 아보하 애견펜션 - 오시는길" />
  <meta name="twitter:description" content="아보하의 이름처럼, 특별한 하루보다
가족과, 반려견과 함께하는
아주 보통의 하루가 더 소중하니까요.

평범한 하루가
가장 값진 기억이 될 수 있도록,
아보하가 함께하겠습니다" />
  <meta name="twitter:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/f9520fa3-9bad-47b7-8e66-75df80ca1bad/thumbnail/1763952348766-11we3rjuurm.jpg" />
</head>
<body>
    <!-- Navigation (Header) - page-wrapper 밖으로 분리 -->
    <div class="navigation-off">
        <div id="header-container"></div>
    </div>

    <div class="page-wrapper">
        <!-- CUSTOM FIELD : 오시는길 메인소개 섹션 이미지 (슬라이드쇼) -->
        <div class="main-section">
            <!-- custom field : 히어로 슬라이더 이미지 동적 생성 (mapper) -->
            <div class="main-bg" data-hero-slider></div>
            <div class="main-content">
                <!-- custom field : 오시는길 타이틀 매핑 -->
                <h1 class="main-title" data-directions-title></h1>
                <div class="title-divider"><div class="bar-progress"></div></div>
                <!-- custom field : 오시는길 설명 매핑 -->
                <p class="main-subtitle" data-directions-description></p>
            </div>
            <div class="main-arrow">
                <div class="arrow-left"></div>
                <p class="arrow-number">01</p>
                <div class="arrow-divider"></div>
                <p class="arrow-number">10</p>
                <div class="arrow-right"></div>
            </div>
        </div>

        <!-- Con (Content) - 오시는 길 -->
        <div class="section-con">
            <div class="directions-info">
                <!-- 하드코딩, 매핑 x -->
                <p class="page-title">Directions</p>
                <p class="address-text">
                    <span class="address-row">
                        <!-- 하드코딩, 매핑 x -->
                        <span class="bold">도로명 주소 : </span>
                        <!-- 숙소설정 상세주소 매핑 -->
                        <span class="medium" data-directions-address></span>
                    </span>
                    <span class="address-row">
                        <!-- 하드코딩, 매핑 x -->
                        <span class="bold">전화 : </span>
                        <!-- 숙소설정 운영정보 전화번호 매핑 -->
                        <span class="medium" data-directions-phone></span>
                    </span>
                </p>
            </div>

            <div class="map-container">
                <!-- kakao map : property.latitude, property.longitude 매핑 -->
                <div class="map-img-wrapper">
                    <div id="kakao-map" style="width:100%;height:100%"></div>
                </div>
            </div>
        </div>

        <!-- 홈 / 마무리 섹션과 동일하게 매핑 -->
        <div class="content-4 closing-section">
            <!-- custom field : 마무리 섹션 이미지 매핑 -->
            <div class="content-4-bg" data-closing-image></div>
            <div class="content-4-text">
                <!-- custom field : 마무리 섹션 제목 매핑 -->
                <h2 data-closing-title></h2>
                <!-- custom field : 마무리 섹션 내용 매핑 -->
                <p data-closing-description></p>
            </div>
        </div>

        <!-- Footer -->
        <div id="footer-container"></div>
    </div>

    <!-- Kakao Map SDK -->
    <script type="text/javascript" src="js/kakao-maps-sdk.js"></script>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/pages/directions.js"></script>

    <!-- Data Mapper -->
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/directions-mapper.js"></script>
    <script src="js/preview-handler.js"></script>

    <!-- Header / Footer Loader -->
    <script src="js/header-footer-loader.js"></script>
</body>
</html>
